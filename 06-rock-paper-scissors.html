<!DOCTYPE html>
<html>

  <head>
    <title>Booleans</title>
  </head>

  <body>

    <p>Rock Paper Scissors</p>

    <button 
    onclick = "
      computerMove = Math.random();
      computerMove = computerMoveFunc(computerMove);
      if (computerMove === 'rock'){
        result = 'Draw';
        score.draw++;
      } else if (computerMove === 'paper'){
        score.lose++;
        result = 'You Lose!';
      } else if (computerMove === 'scissor'){
        score.win++;
        result = 'You Win!';
      }
      localStorage.setItem('score',JSON.stringify(score));
      document.querySelector('.score').innerHTML =`Result : ${result} Score : Win : ${score.win}, Lose: ${score.lose}, Draw: ${score.draw}`;
    ">Rock</button>

    <button 
    onclick = "
    computerMove = Math.random();
    computerMove = computerMoveFunc(computerMove);
      if (computerMove === 'paper'){
        result = 'Draw';
        score.draw++;
      } else if (computerMove === 'scissor'){
        score.lose++;
        result = 'You Lose!';
      } else if (computerMove === 'rock'){
        score.win++;
        result = 'You Win!';
      }
      localStorage.setItem('score',JSON.stringify(score));
      document.querySelector('.score').innerHTML =`Result : ${result} Score : Win : ${score.win}, Lose: ${score.lose}, Draw: ${score.draw}`;
    ">Paper</button>

    <button 
    onclick="
      computerMove = Math.random();
      computerMove = computerMoveFunc(computerMove);
      if (computerMove === 'scissor'){
        result = 'Draw';
        score.draw++;
      } else if (computerMove === 'rock'){
        score.lose++;
        result = 'You Lose!';
      } else if (computerMove === 'paper'){
        score.win++;
        result = 'You Win!';
      }
      localStorage.setItem('score', JSON.stringify(score));
      document.querySelector('.score').innerHTML =`Result : ${result} Score : Win : ${score.win}, Lose: ${score.lose}, Draw: ${score.draw}`;
    ">Scissors</button>

    <button 
    onclick="
      score.win=0;
      score.lose=0;
      score.draw=0;
      localStorage.removeItem('score');
      document.querySelector('.score').innerHTML =`Result : ${result} Score : Win : ${score.win}, Lose: ${score.lose}, Draw: ${score.draw}`;
    ">Reset Button</button>

    <p> Scorecard</p>
    <p class="score"></p>

    <script>

      let score = JSON.parse(localStorage.getItem('score'));

      if (!score){
        score = {
          win : 0,
          lose : 0,
          draw : 0
        }
      }

      function computerMoveFunc (computerMove){
        if (computerMove >=0 && computerMove <= 1/3 ){
          computerMove = 'rock';
        } else if (computerMove > 1/3 && computerMove <2/3) {
          computerMove = 'paper';
        } else if (computerMove >= 2/3 && computerMove <=1){
          computerMove = 'scissor';
        }
        return computerMove;
      }

      let win = 0;
      let lose = 0;
      let draw = 0;
      let result = '';
      let computerMove = '';

    </script>
  </body>
</html>
