<!DOCTYPE html>
<html>

  <head>
    <title>Variables</title>
  </head>

  <body>

    <button 
    onclick = "
      console.log(`Cart Quantity: ${quantity}`)
    ">Show Quantity</button>

    <button
    onclick = "
      quantity++;
      console.log(`Cart Quantity: ${quantity}`);
    "
    >Add To Cart</button>

    <button
    onclick = "
      quantity += 2;
      console.log(`Cart Quantity: ${quantity}`);
    "
    >+2</button>

    <button
    onclick = "
      quantity += 3;
      console.log(`Cart Quantity: ${quantity}`);
    "
    >+3</button>
    
    <button
    onclick = "
      quantity = 0;
      console.log(`Cart Quantity: ${quantity}`);
    "
    >Reset Cart</button>

    <script>

      let quantity = 0;

    </script>
  </body>
</html>
