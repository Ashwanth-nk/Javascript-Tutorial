<!DOCTYPE html>
<html>

  <head>
    <title>DOM</title>
  </head>

  <body>

    <p>YouTube Subscribe Button</p>

    <button class="sub" 
    onclick = "
      const status = document.querySelector('.sub').innerText;
      if (status === 'Subscribe'){
        document.querySelector('.sub').innerText = 'Subscribed';
        //document.querySelector('.sub').classList.add('is-subscribed')
      } else {
        document.querySelector('.sub').innerText = 'Subscribe';
      }
    ">Subscribe</button>

    <p>Amazon Shipping Calculator</p>
    <p>Orders under $40 = +$10 shipping.</p>
    <p>Orders over $40 = FREE shipping.</p>

    <input class="new" type="text" placeholder="Cost of order" 
    onkeydown="
      if (event.key === 'Enter'){
        console.log('Calculate!')
      }
    ">

    <button class="calc" 
    onclick="

      let data = Number(document.querySelector('.new').value);
      if (data<40){
        data += 10
      }
      document.querySelector('.result').innerHTML = data;
    ">Calculate</button>

    <p class="result"></p>

    <script>
      /*
      document.body.innerHTML = 'hello';
      document.title = 'NewTab';
      */
    </script>
  </body>
</html>
